version: '3.9'

# Docker Compose pour orchestrer la pipeline complète : collecte → entraînement → prédiction
# À placer à la racine ~/projets/navettes_maritimes/ et lancer depuis ce dossier
#
# Usage:
#   docker-compose -f docker-compose.orchestration.yml up --build
# ou pour un service spécifique:
#   docker-compose -f docker-compose.orchestration.yml run meteo_marine_collect
#   docker-compose -f docker-compose.orchestration.yml run maritime_model
#   docker-compose -f docker-compose.orchestration.yml run navettes_pred

services:

  # ========================================
  # 1. COLLECTE MÉTÉO (meteo_marine)
  # ========================================
  meteo_marine_collect:
    build:
      context: ./meteo_marine
      dockerfile: Dockerfile
    container_name: meteo_marine_collect
    environment:
      - PYTHONUNBUFFERED=1
      - METEO_EXAMPLE_PROXY=${METEO_EXAMPLE_PROXY:-0}
    volumes:
      - meteo_data:/app/data
    working_dir: /app
    command: uv run -m src.pipeline
    networks:
      - meteo_pipeline

  # ========================================
  # 2. ENTRAÎNEMENT MODÈLE (maritime)
  # ========================================
  maritime_model:
    build:
      context: ./maritime
      dockerfile: Dockerfile
    container_name: maritime_model
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - meteo_data:/maritime_data/meteo:ro          # Données météo (lecture seule)
      - maritime_data:/app/data                     # Données historiques maritimes
      - maritime_artifacts:/app/artifacts           # Modèle entraîné
    working_dir: /app
    command: python src/train_annulation.py
    depends_on:
      - meteo_marine_collect
    networks:
      - meteo_pipeline

  # ========================================
  # 3. PRÉDICTION / INFÉRENCE (navettes)
  # ========================================
  navettes_pred:
    build:
      context: ./navettes
      dockerfile: Dockerfile
    container_name: navettes_pred
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/model/model.pkl
      - FEATURES_PATH=/model/features.json
    ports:
      - "8000:8000"
    volumes:
      - meteo_data:/input_data/meteo:ro            # Données météo pour inférence
      - maritime_artifacts:/model:ro               # Modèle entraîné
      - navettes_predictions:/app/predictions      # Résultats de prédiction
    working_dir: /app
    command: python src/predict_annulation.py
    depends_on:
      - maritime_model
    networks:
      - meteo_pipeline

volumes:
  meteo_data:
    driver: local
  maritime_data:
    driver: local
  maritime_artifacts:
    driver: local
  navettes_predictions:
    driver: local

networks:
  meteo_pipeline:
    driver: bridge
