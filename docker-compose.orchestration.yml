version: '3.9'

# Orchestration pour la pipeline : collecte → entraînement → prédiction

# Usage:

# docker-compose -f docker-compose.orchestration.yml up --build

services:

# ========================================

# 1. COLLECTE MÉTÉO

# ========================================

  meteo_marine_collect:  
    build:  
      context: ./meteo_marine  
      dockerfile: Dockerfile  
    container_name: meteo_marine_collect  
    environment:  
      - PYTHONUNBUFFERED=1  
      - METEO_EXAMPLE_PROXY=${METEO_EXAMPLE_PROXY:-0}  
    volumes:  
      - meteo_data:/app/data  
    working_dir: /app  
    command: uv run -m src.pipeline  
    restart: unless-stopped  
    networks:  
      - meteo_pipeline

# ========================================

# 2. ENTRAÎNEMENT MODÈLE

# ========================================

  maritime_model:  
    build:  
      context: ./maritime  
      dockerfile: Dockerfile  
    container_name: maritime_model  
    environment:  
      - PYTHONUNBUFFERED=1  
    volumes:  
      - meteo_data:/maritime_data/meteo:ro  
      - maritime_data:/app/data  
      - maritime_artifacts:/app/artifacts  
    working_dir: /app  
    command: python src/train_annulation.py  
    depends_on:  
      - meteo_marine_collect  
    restart: unless-stopped  
    deploy:  
      resources:  
        limits:  
          cpus: '1.0'  
          memory: 2G  
    networks:  
      - meteo_pipeline

# ========================================

# 3. PRÉDICTION / INFÉRENCE

# ========================================

  navettes_pred:  
    build:  
      context: ./navettes  
      dockerfile: Dockerfile  
    container_name: navettes_pred  
    environment:  
      - PYTHONUNBUFFERED=1  
      - MODEL_PATH=${MODEL_PATH:-/model/model.pkl}  
      - FEATURES_PATH=${FEATURES_PATH:-/model/features.json}  
    ports:  
      - "${NAVETTES_PRED_PORT:-8000}:8000"  
    volumes:  
      - meteo_data:/input_data/meteo:ro  
      - maritime_artifacts:/model:ro  
      - navettes_predictions:/app/predictions  
    working_dir: /app  
    command: python src/predict_annulation.py  
    depends_on:  
      - maritime_model  
    restart: unless-stopped  
    healthcheck:  
      test: ["CMD", "curl", "-f", "[http://localhost:8000/health]"]
      interval: 30s  
      timeout: 10s  
      retries: 3  
    networks:  
      - meteo_pipeline

volumes:  
  meteo_data:  
    driver: local  
    driver_opts:  
      type: none  
      device: ./data/meteo  
      o: bind  
  maritime_data:  
    driver: local  
    driver_opts:  
      type: none  
      device: ./data/maritime  
      o: bind  
  maritime_artifacts:  
    driver: local  
    driver_opts:  
      type: none  
      device: ./data/artifacts  
      o: bind  
  navettes_predictions:  
    driver: local  
    driver_opts:  
      type: none  
      device: ./data/predictions  
      o: bind

networks:  
  meteo_pipeline:  
    driver: bridge